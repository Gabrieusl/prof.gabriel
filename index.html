<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLANEJAMENTO 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
    
<body>
    <header>
        <div class="logo"><strong>PLANEJAMENTO 2026</strong></div>
        <nav id="main-nav" style="display:none;">
            <button onclick="showView('calendar')">📅 Calendário</button>
            <button onclick="showView('table')">📊 Tabela</button>
            <button id="btn-logout" style="background:#e74c3c; border-radius: 5px; border:none; color:white; padding:8px 15px; cursor:pointer;">Sair</button>
        </nav>
    </header>

    <main>
        <section id="login-view">
            <div style="text-align: center; margin-top: 100px; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin-left: auto; margin-right: auto;">
                <h2>🔒 Acesso Restrito</h2>
                <p>Olá, Gabriel! Faça login com sua conta do Google para planejar suas aulas.</p>
                <button id="btn-google-login" style="display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 15px; background: white; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s;">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa/google.svg" width="20">
                    Entrar com Google
                </button>
            </div>
        </section>

        <section id="app-content" style="display:none;">
            <div id="calendar-view">
                <div class="calendar-controls">
                    <button id="prevMonth">◀ Anterior</button>
                    <h2 id="monthDisplay">...</h2>
                    <button id="nextMonth">Próximo ▶</button>
                </div>
                <div class="calendar-grid-header">
                    <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
                </div>
                <div id="calendarGrid" class="calendar-grid"></div>
            </div>

            <section id="table-view" style="display:none;">
                <div class="filters-container">
                    <input type="date" id="searchData" onchange="updateTable()">
                    
                    <select id="searchTurma" onchange="updateTable()">
                        <option value="">Todas as Turmas</option>
                        <option value="6º ano">6º ano</option>
                        <option value="7º ano">7º ano</option>
                        <option value="8º ano">8º ano</option>
                        <option value="9º ano">9º ano</option>
                        <option value="1ª série">1ª série</option>
                        <option value="2ª série">2ª série</option>
                        <option value="3ª série">3ª série</option>
                    </select>

                    <select id="searchMateria" onchange="updateTable()">
                        <option value="">Todas as Disciplinas</option>
                        <option value="Matemática">Matemática</option>
                        <option value="Ed. Financeira">Ed. Financeira</option>
                        <option value="Ed. Digital">Ed. Digital</option>
                        <option value="Recomposição">Recomposição</option>
                    </select>
                </div>
                <div class="table-container">
                    <table id="mainTable">
                        <thead><tr><th>Data</th><th>Turma</th><th>Disciplina</th><th>Conteúdo</th><th>Anexo</th></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </section>
        </section>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalDateTitle">Planejamento</h3>
            <div id="classInputs"></div>
            <div class="modal-buttons">
                <button onclick="closeModal()">Cancelar</button>
                <button class="save-btn" onclick="saveData()">Salvar na Nuvem</button>
            </div>
        </div>
    </div>

    <footer>Desenvolvido por Prof. Gabriel</footer>

    <script type="module" src="java.js"></script>
</body>
</html>
